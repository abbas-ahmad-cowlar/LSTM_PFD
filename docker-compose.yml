# Docker Compose for LSTM_PFD — minimal honest stack (Convergence Plan P2.4).
# One service: the FastAPI inference API serving the trained checkpoint.
#
#   docker compose up api
#   curl localhost:8000/health
#
# The dashboard (frozen until Phase D) has its own compose file under
# packages/dashboard/. K8s/Helm manifests were removed 2026-06 — recoverable
# from tag `pre-convergence-2026-06` if a real cluster deployment need appears.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lstm_pfd_api
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu
      - MODEL_PATH=/app/checkpoints/cnn/best_model.pth
      - MODEL_TYPE=torch
      - LOG_LEVEL=INFO
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
