# LSTM-PFD Bearing Fault Dataset Card
# Per MASTER_ROADMAP_FINAL.md Chapter 3.5 - Dataset Contribution
# Format follows ML dataset card best practices

name: LSTM-PFD Bearing Fault Dataset
version: 1.0.0
license: CC-BY-4.0
doi: 10.5281/zenodo.XXXXXXX # TODO: Update after Zenodo upload

# Dataset Overview
description: |
  Physics-informed synthetic hydrodynamic journal bearing vibration signals
  for fault diagnosis research. Generated using the LSTM-PFD signal generator
  with 11 fault classes, 7-layer independent noise model, Sommerfeld-scaled
  physics, and multi-severity progression.

# Size and Format
size: 2.3 GB
format:
  - HDF5 (primary)
  - CSV (metadata)
samples: 50000
classes: 11

# Class Distribution
class_names:
  - sain                        # Normal / Healthy
  - desalignement               # Misalignment (2X + 3X harmonics)
  - desequilibre                # Imbalance (1X dominant, speed² scaling)
  - jeu                         # Bearing Clearance (sub-synchronous + 1X + 2X)
  - lubrification               # Lubrication (stick-slip + metal contact)
  - cavitation                  # Cavitation (high-freq bursts, Hann-windowed)
  - usure                       # Wear (broadband + asperity harmonics)
  - oilwhirl                    # Oil Whirl (sub-sync ~0.42-0.48× speed)
  - mixed_misalign_imbalance    # Mixed: Misalignment + Imbalance
  - mixed_wear_lube             # Mixed: Wear + Lubrication
  - mixed_cavit_jeu             # Mixed: Cavitation + Clearance

# Technical Specifications
sampling_rate: 20480 # Hz
signal_length: 102400 # samples (5 seconds)
severity_levels:
  - incipient (20-45%)
  - mild (45-70%)
  - moderate (70-90%)
  - severe (90-100%)

# Physics Model
physics_basis: |
  Signals generated using Sommerfeld-scaled hydrodynamic bearing dynamics:
  - Sommerfeld number: S = S_base × viscosity × speed / load (clamped 0.05–0.5)
  - Oil whirl frequency: f_whirl ≈ 0.42–0.48 × rotational speed
  - Physics factor: sqrt(S / S_base) for amplitude scaling
  - Reynolds number: 500–5000 (laminar regime)
  - Clearance ratio: 0.001–0.003
  See data/PHYSICS_MODEL_GUIDE.md for detailed equations.

# Data Quality
quality_comparison:
  metric: value
  mean_rms: 0.42
  peak_frequency_hz: 118
  kurtosis: 3.8
  crest_factor: 4.2

# Splits
train_split: 0.70
validation_split: 0.15
test_split: 0.15

# Versioning
dvc_tracked: true
git_tag: data-v1.0

# Citation
citation: |
  @dataset{lstm_pfd_2026,
    author = {Ahmad, Abbas and Contributors},
    title = {LSTM-PFD Bearing Fault Dataset: Physics-Informed Synthetic Vibration Signals},
    year = {2026},
    publisher = {Zenodo},
    doi = {10.5281/zenodo.XXXXXXX},
    url = {https://github.com/abbas-ahmad-cowlar/LSTM_PFD}
  }

# Usage
usage_example: |
  import h5py

  with h5py.File('bearing_dataset.h5', 'r') as f:
      X_train = f['train/signals'][:]
      y_train = f['train/labels'][:]

